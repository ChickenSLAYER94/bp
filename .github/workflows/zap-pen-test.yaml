name: Pen Testing w/ ZAP

env:
  URI: https://bp-calc.azurewebsites.net/           
  
on:
  workflow_dispatch:               
  workflow_call:  # making it reusable workflow
  
jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
    - name: Docker image for OWASP ZAP
      run: docker pull zaproxy/zap-weekly

    - name: Execute baseline scan
      run: docker run -v /report:/zap/wrk/:rw --user root -t zaproxy/zap-weekly zap-baseline.py -t ${{env.URI}} -I -r zap-report.html

    - name: Check for high-severity alerts
      run: |    
        HIGH_ALERTS=$(grep -i 'risk.*High' /report/zap-report.html | wc -l)  # This will check the report and if the high risk alerts are greater than 1 it will fail the job
        echo "High-severity alerts found: $HIGH_ALERTS"
        if [ "$HIGH_ALERTS" -gt 3 ]; then
          echo "❌ Pipeline failed: $HIGH_ALERTS high-severity vulnerabilities detected"
          exit 1
        fi
        echo "✅ Scan passed: No high-severity alerts"
        echo "-----------------------------------------"
        ALERTS=$(grep -c '<td>High</td>' /report/zap-report.html)
        echo "-----------------------------------------"
        grep -A1 'risk-3' report.html | tail -1 | sed 's/<[^>]*>//g' | xargs
        echo "-----------------------------------------"
        HIG=$(grep -A 1 'class="risk-3"' /report/zap-report.html | grep -o '<div>[0-9]*</div>' | head -1 | grep -o '[0-9]*')
        echo "$HIG"
        echo "-----------------------------------------"
        HIGERTS=$(grep -A 3 'class="risk-3"' /report/zap-report.html | grep -oP '>\K\d+(?=<)' | head -1)
        echo "$HIGERTS"
        echo "-----------------------------------------"
        echo "ALERTS"
  
    - uses: actions/upload-artifact@v4
      if: always()  # Upload the report even if the check above failed
      name: upload OWASP ZAP report
      with:
        name: OWASP ZAP Report
        path: /report/zap-report.html
