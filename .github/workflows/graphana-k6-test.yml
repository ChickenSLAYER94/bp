# Grafana k6 load test workflow
name: k6 BMI

on:
  workflow_dispatch:                  # manually triggered
  workflow_call:            # making it reusable workflow

jobs:

  k6_load_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Pull Docker image for k6
      run: docker pull grafana/k6

    - name: Run k6 load test 1 and generate report
      run: docker run -i grafana/k6 run - <k6tests/Performance-test1.js > k6report1.txt

    - name: Run k6 load test 2 and generate report
      run: docker run -i grafana/k6 run - <k6tests/Performance-test1.js > k6report2.txt


    - uses: actions/upload-artifact@v4
      with:
        name: k6report from Performance-test1.js
        path: k6report1.txt

    - uses: actions/upload-artifact@v4
      with:
        name: k6report from Performance-test2.js
        path: k6report2.txt